<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; position: fixed; overscroll-behavior: none;
    font-family: 'Inter', sans-serif; background: #050814;
  }
  .font-serif-lux { font-family: 'Playfair Display', serif; }
  canvas { display: block; touch-action: none; }
  #canvasContainer { position: fixed; inset: 0; z-index: 0; }

  /* ---------- Intro ---------- */
  #introOverlay {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(circle at 50% 40%, #10131c 0%, #030405 80%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 1.1s ease;
  }
  #introOverlay.fade-out { opacity: 0; pointer-events: none; }
  .intro-title {
    opacity: 0; color: #f2ead8; letter-spacing: 0.12em;
    animation: fadeUp 1.6s ease forwards;
    text-shadow: 0 0 30px rgba(242,234,216,0.25);
  }
  .intro-sub {
    opacity: 0; color: #b7ab8f; letter-spacing: 0.35em;
    animation: fadeUp 1.6s ease forwards; animation-delay: 0.55s;
  }
  .intro-line {
    width: 0; height: 1px; background: #b7ab8f; margin: 18px auto;
    animation: expandLine 1.2s ease forwards; animation-delay: 1.1s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  @keyframes expandLine { from { width: 0; } to { width: 140px; } }
  @keyframes floatPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  .ui-fade-in { animation: fadeIn 0.8s ease forwards; }
  .panel-hidden { transform: translateY(120%); }
  .panel-visible { transform: translateY(0%); }

  .glass {
    background: rgba(15, 18, 28, 0.55);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .glass-light {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.15);
  }

  #chatMessages::-webkit-scrollbar { width: 4px; }
  #chatMessages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

  .msg-bubble { animation: fadeUp 0.35s ease forwards; }
  .typing-dot { animation: floatPulse 1s infinite ease-in-out; }
  .typing-dot:nth-child(2){ animation-delay:0.15s; }
  .typing-dot:nth-child(3){ animation-delay:0.3s; }

  .nav-btn { transition: all 0.2s ease; }
  .nav-btn:active { transform: scale(0.92); }

  .quick-chip { transition: all 0.15s ease; }
  .quick-chip:active { transform: scale(0.94); }

  #loadingHint {
    position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
    opacity: 0; animation: fadeIn 1s ease forwards; animation-delay: 2s;
  }
</style>
</head>

try { emailjs.init(EMAILJS_PUBLIC_KEY); } catch(e) { /* ignored until configured */ }

/* ============================= ICONS ============================= */
function safeCreateIcons() {
  try {
    if (typeof lucide !== 'undefined') lucide.createIcons();

    console.warn('Lucide icons failed to render:', e);

}
safeCreateIcons();

/* ============================= THREE.JS SCENE ============================= */
const container = document.getElementById('canvasContainer');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xbfe3f5);
scene.fog = new THREE.Fog(0xcfe9f7, 25, 90);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 300);
const DEFAULT_POS = new THREE.Vector3(17, 10, 19);
const DEFAULT_TARGET = new THREE.Vector3(0, 2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
container.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ---------------- Lighting ---------------- */
const hemi = new THREE.HemisphereLight(0xbfe3ff, 0x445533, 0.6);
scene.add(hemi);

const ambient = new THREE.AmbientLight(0xffffff, 0.15);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff4e0, 1.3);
sun.position.set(22, 30, 12);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -26; sun.shadow.camera.right = 26;
sun.shadow.camera.top = 26; sun.shadow.camera.bottom = -26;
sun.shadow.camera.near = 1; sun.shadow.camera.far = 90;
sun.shadow.bias = -0.0004;

scene.add(sun.target);

const poolLight = new THREE.PointLight(0xffb060, 0, 14, 2);
poolLight.position.set(0, 1.2, 9);

const pathLight1 = new THREE.PointLight(0xffcf8a, 0, 8, 2);

pathLight2.position.set(-6, 1.2, 6);
scene.add(pathLight2);

/* ---------------- Ground ---------------- */

ground.rotation.x = -Math.PI/2;
ground.position.y = -0.02;
ground.receiveShadow = true;

/* ---------------- Materials ---------------- */
const matStone = new THREE.MeshStandardMaterial({ color: 0xe9e4d8, roughness: 0.85, metalness: 0.05 });
const matStoneDark = new THREE.MeshStandardMaterial({ color: 0xccc4b3, roughness: 0.8 });

const matGlass = new THREE.MeshPhysicalMaterial({ color: 0x9fd8e8, roughness: 0.05, metalness: 0.1, transparent: true, opacity: 0.35, clearcoat: 1 });
const matWater = new THREE.MeshPhysicalMaterial({ color: 0x2fa9c9, roughness: 0.05, metalness: 0.2, transparent: true, opacity: 0.88, clearcoat: 0.6 });
const matWood = new THREE.MeshStandardMaterial({ color: 0x8a6a4d, roughness: 0.75 });
const matFoliage = new THREE.MeshStandardMaterial({ color: 0x3f6b3a, roughness: 0.9 });
const matTrunk = new THREE.MeshStandardMaterial({ color: 0x5a4331, roughness: 0.9 });

const windowMaterials = []; // toggled at night

function makeWindowMat() {
  const m = new THREE.MeshStandardMaterial({ color: 0xfff3d6, emissive: 0xffdca0, emissiveIntensity: 0, roughness: 0.3 });
  windowMaterials.push(m);
  return m;
}

/* ---------------- Villa Group ---------------- */
const villa = new THREE.Group();
scene.add(villa);

function addMesh(geo, mat, x, y, z, castShadow=true, receiveShadow=true) {
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  m.castShadow = castShadow;
  m.receiveShadow = receiveShadow;
  villa.add(m);
  return m;
}

// Ground floor main block
addMesh(new THREE.BoxGeometry(14, 3.2, 9), matStone, 0, 1.6, 0);
// Upper floor (Master Suite) block
addMesh(new THREE.BoxGeometry(8, 3, 6), matConcrete, -3, 4.7, -1);
// Rooftop lounge slab
addMesh(new THREE.BoxGeometry(8.6, 0.3, 6.6), matStoneDark, -3, 6.35, -1);
// Roof over ground floor
addMesh(new THREE.BoxGeometry(14.6, 0.35, 9.6), matRoof, 0, 3.38, 0);
// Parapet around rooftop lounge
const parapetGeo = new THREE.BoxGeometry(8.6, 0.5, 0.15);
addMesh(parapetGeo, matStoneDark, -3, 6.7, 2.25);
addMesh(parapetGeo, matStoneDark, -3, 6.7, -4.25);
const parapetSideGeo = new THREE.BoxGeometry(0.15, 0.5, 6.6);
addMesh(parapetSideGeo, matStoneDark, -7.25, 6.7, -1);
addMesh(parapetSideGeo, matStoneDark, 1.25, 6.7, -1);

// Front glass facade (Living Room)
addMesh(new THREE.BoxGeometry(10, 2.4, 0.1), matGlass, 2, 2, 4.55);

// Side wall accents
addMesh(new THREE.BoxGeometry(0.3, 3.2, 9), matStoneDark, -7, 1.6, 0);
addMesh(new THREE.BoxGeometry(0.3, 3.2, 9), matStoneDark, 7, 1.6, 0);

// Front overhang roof + pillars
addMesh(new THREE.BoxGeometry(11, 0.25, 2.4), matRoof, 2, 3.55, 6.6);
[-2.6, 0.6, 3.8, 6.8].forEach(x => {
  addMesh(new THREE.CylinderGeometry(0.14, 0.14, 3.5, 16), matConcrete, x, 1.75, 7.6);
});

// Master suite windows (Master Suite hotspot area)
for (let i = 0; i < 3; i++) {
  addMesh(new THREE.BoxGeometry(1.3, 1.4, 0.1), makeWindowMat(), -5.4 + i*2, 4.9, 2.06);
}
// Living room strip windows glow (front facade uses matGlass but add inner emissive strip)
for (let i = 0; i < 4; i++) {
  addMesh(new THREE.BoxGeometry(0.15, 1.6, 1.8), makeWindowMat(), 6.9, 2.2, -1.5 + i*1.2);
}

// Entrance door
addMesh(new THREE.BoxGeometry(1.2, 2.2, 0.1), matWood, -5, 1.3, 4.55);

// Pool deck + infinity pool (Horizon Pool hotspot)
addMesh(new THREE.BoxGeometry(9, 0.12, 13), matStoneDark, 0, 0.02, 10);
const pool = new THREE.Mesh(new THREE.PlaneGeometry(6, 10), matWater);
pool.rotation.x = -Math.PI/2;
pool.position.set(0, 0.09, 10);
pool.receiveShadow = true;
villa.add(pool);

// Rooftop fire pit (Rooftop Lounge)
addMesh(new THREE.CylinderGeometry(0.6, 0.7, 0.4, 20), matStoneDark, -3, 6.55, -1);
const fireGlow = new THREE.PointLight(0xff8a3d, 0.9, 5, 2);
fireGlow.position.set(-3, 7, -1);
scene.add(fireGlow);

// Trees
function createTree(x, z, scale=1) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.16, 1.4, 8), matTrunk);
  trunk.position.y = 0.7; trunk.castShadow = true;
  const c1 = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.6, 10), matFoliage);
  c1.position.y = 1.7; c1.castShadow = true;
  const c2 = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.3, 10), matFoliage);
  c2.position.y = 2.5; c2.castShadow = true;
  g.add(trunk, c1, c2);
  g.position.set(x, 0, z);
  g.scale.setScalar(scale);
  scene.add(g);
}
[[-14,10,1.2],[-16,3,0.9],[13,12,1.1],[15,4,1],[10,-9,0.9],[-11,-9,1],[0,17,1.1],[-9,15,0.8]].forEach(([x,z,s])=>createTree(x,z,s));

const hotspots = [

function makeGlowTexture() {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(64,64,0,64,64,64);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.35, 'rgba(255,230,170,0.9)');
  grad.addColorStop(1, 'rgba(255,230,170,0)');
  ctx.fillStyle = grad; ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const glowTex = makeGlowTexture();
const hotspotMarkers = [];
hotspots.forEach((h, i) => {
  const mat = new THREE.SpriteMaterial({ map: glowTex, transparent: true, depthTest: true, depthWrite:false });
  const sprite = new THREE.Sprite(mat);
  sprite.position.set(h.pos[0], h.pos[1], h.pos[2]);
  sprite.scale.set(0.7, 0.7, 1);
  sprite.userData.index = i;
  sprite.userData.baseScale = 0.7;
  scene.add(sprite);
  hotspotMarkers.push(sprite);

/* ============================= CUSTOM TOUCH ORBIT CONTROLS ============================= */
const camState = { theta: Math.atan2(DEFAULT_POS.x, DEFAULT_POS.z), phi: Math.acos(DEFAULT_POS.y / DEFAULT_POS.length()), radius: DEFAULT_POS.length(), target: DEFAULT_TARGET.clone() };
let isFlying = false;

function updateCameraFromState() {
  const sinPhiR = camState.radius * Math.sin(camState.phi);
  camera.position.x = camState.target.x + sinPhiR * Math.sin(camState.theta);
  camera.position.y = camState.target.y + camState.radius * Math.cos(camState.phi);
  camera.position.z = camState.target.z + sinPhiR * Math.cos(camState.theta);
  camera.lookAt(camState.target);
}
updateCameraFromState();

const pointers = new Map();
let dragStart = null, dragStartTime = 0;
let lastSinglePos = null;
let lastPinchDist = null, lastMid = null;

function getPinchInfo() {
  const arr = Array.from(pointers.values());
  const dx = arr[0].x - arr[1].x, dy = arr[0].y - arr[1].y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const mid = { x: (arr[0].x + arr[1].x)/2, y: (arr[0].y + arr[1].y)/2 };
  return { dist, mid };
}

renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

renderer.domElement.addEventListener('pointerdown', (e) => {
  renderer.domElement.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size === 1) {
    dragStart = { x: e.clientX, y: e.clientY };
    dragStartTime = performance.now();
    lastSinglePos = { x: e.clientX, y: e.clientY };
  } else if (pointers.size === 2) {
    const info = getPinchInfo();
    lastPinchDist = info.dist;
    lastMid = info.mid;
  }
});

renderer.domElement.addEventListener('pointermove', (e) => {
  if (!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (pointers.size === 1 && !isFlying) {
    const dx = e.clientX - lastSinglePos.x;
    const dy = e.clientY - lastSinglePos.y;
    camState.theta -= dx * 0.006;
    camState.phi -= dy * 0.006;
    camState.phi = Math.max(0.25, Math.min(1.45, camState.phi));
    lastSinglePos = { x: e.clientX, y: e.clientY };
  } else if (pointers.size === 2 && !isFlying) {
    const info = getPinchInfo();
    const deltaDist = info.dist - lastPinchDist;
    camState.radius -= deltaDist * 0.04;
    camState.radius = Math.max(6, Math.min(45, camState.radius));

    const deltaMidX = info.mid.x - lastMid.x;
    const deltaMidY = info.mid.y - lastMid.y;
    const right = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 0);
    const up = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 1);
    const panSpeed = camState.radius * 0.0012;
    camState.target.addScaledVector(right, -deltaMidX * panSpeed);
    camState.target.addScaledVector(up, deltaMidY * panSpeed);

    lastPinchDist = info.dist;
    lastMid = info.mid;
  }
});

function endPointer(e) {
  const wasSingle = pointers.size === 1;
  const releasedPos = pointers.get(e.pointerId);
  pointers.delete(e.pointerId);

  if (wasSingle && dragStart && releasedPos) {
    const dist = Math.hypot(releasedPos.x - dragStart.x, releasedPos.y - dragStart.y);
    const elapsed = performance.now() - dragStartTime;
    if (dist < 8 && elapsed < 450) handleTap(e.clientX, e.clientY);
  }
  if (pointers.size < 2) { lastPinchDist = null; lastMid = null; }
  if (pointers.size === 0) dragStart = null;
  if (pointers.size === 1) {
    const remaining = Array.from(pointers.values())[0];
    lastSinglePos = { x: remaining.x, y: remaining.y };
  }
}
renderer.domElement.addEventListener('pointerup', endPointer);
renderer.domElement.addEventListener('pointercancel', endPointer);

// Desktop mouse wheel zoom
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  camState.radius += e.deltaY * 0.015;
  camState.radius = Math.max(6, Math.min(45, camState.radius));
}, { passive: false });

/* ---------------- Tap / Raycast ---------------- */
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
function handleTap(clientX, clientY) {
  const rect = renderer.domElement.getBoundingClientRect();
  ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(hotspotMarkers);
  if (hits.length > 0) openHotspot(hits[0].object.userData.index);
}

/* ---------------- Camera Fly Animation ---------------- */
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }

function flyTo(destPos, destTarget, duration = 1400, onDone) {
  isFlying = true;
  const startPos = camera.position.clone();
  const startTarget = camState.target.clone();
  const startTime = performance.now();
  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const e = easeInOutCubic(t);
    const pos = startPos.clone().lerp(destPos, e);
    const tgt = startTarget.clone().lerp(destTarget, e);
    camera.position.copy(pos);
    camState.target.copy(tgt);
    camera.lookAt(tgt);
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      const offset = camera.position.clone().sub(tgt);
      camState.radius = offset.length();
      camState.phi = Math.acos(THREE.MathUtils.clamp(offset.y / camState.radius, -1, 1));
      camState.theta = Math.atan2(offset.x, offset.z);
      isFlying = false;
      if (onDone) onDone();
    }
  }
  requestAnimationFrame(step);
}

/* ============================= DAY / NIGHT TOGGLE ============================= */
let isNight = false;
const dayState = { sky: 0xbfe3f5, fog: 0xcfe9f7, sunColor: 0xfff4e0, sunIntensity: 1.3, hemiIntensity: 0.6, ambientIntensity: 0.15, windowIntensity: 0, glowIntensity: 0 };
const nightState = { sky: 0x050814, fog: 0x0a0f1f, sunColor: 0x8fa8ff, sunIntensity: 0.12, hemiIntensity: 0.12, ambientIntensity: 0.05, windowIntensity: 1.7, glowIntensity: 1.1 };

function toggleDayNight() {
  isNight = !isNight;
  const from = isNight ? dayState : nightState;
  const to = isNight ? nightState : dayState;
  const skyFrom = new THREE.Color(from.sky), skyTo = new THREE.Color(to.sky);
  const fogFrom = new THREE.Color(from.fog), fogTo = new THREE.Color(to.fog);
  const sunFrom = new THREE.Color(from.sunColor), sunTo = new THREE.Color(to.sunColor);
  const start = performance.now(); const duration = 1000;

  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    scene.background = skyFrom.clone().lerp(skyTo, t);
    scene.fog.color = fogFrom.clone().lerp(fogTo, t);
    sun.color = sunFrom.clone().lerp(sunTo, t);
    sun.intensity = THREE.MathUtils.lerp(from.sunIntensity, to.sunIntensity, t);
    hemi.intensity = THREE.MathUtils.lerp(from.hemiIntensity, to.hemiIntensity, t);
    ambient.intensity = THREE.MathUtils.lerp(from.ambientIntensity, to.ambientIntensity, t);
    const winI = THREE.MathUtils.lerp(from.windowIntensity, to.windowIntensity, t);
    windowMaterials.forEach(m => m.emissiveIntensity = winI);
    const glowI = THREE.MathUtils.lerp(from.glowIntensity, to.glowIntensity, t);
    poolLight.intensity = glowI * 1.1;
    pathLight1.intensity = glowI * 0.8;
    pathLight2.intensity = glowI * 0.8;
    fireGlow.intensity = 0.9 + glowI * 0.5;
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);

  const btn = document.getElementById('dayNightBtn');
  btn.innerHTML = isNight
    ? '<i data-lucide="moon" class="w-5 h-5 text-indigo-200"></i>'
    : '<i data-lucide="sun" class="w-5 h-5 text-amber-200"></i>';
  safeCreateIcons();
}
document.getElementById('dayNightBtn').addEventListener('click', toggleDayNight);

/* ============================= RENDER LOOP ============================= */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  hotspotMarkers.forEach((s, i) => {
    const scale = s.userData.baseScale + Math.sin(t * 2.4 + i * 1.3) * 0.08;
    s.scale.set(scale, scale, 1);
  });
  if (!isFlying) updateCameraFromState();
  renderer.render(scene, camera);
}
animate();

/* ============================= AI CONCIERGE CHAT ============================= */
const chatOverlay = document.getElementById('chatOverlay');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const quickChips = document.getElementById('quickChips');

function openChat() {
  chatOverlay.classList.remove('hidden');
  chatOverlay.classList.add('flex');
  if (chatMessages.childElementCount === 0) {
    setTimeout(() => {
      botSay("Welcome to The Meridian Residence 👋 I'm your AI concierge. Ask me about pricing, specifications, or I can help you book a private viewing.");
      renderChips(['💰 Pricing', '📐 Specifications', '📅 Book a Viewing']);
    }, 300);
  }
}
function closeChat() {
  chatOverlay.classList.add('hidden');
  chatOverlay.classList.remove('flex');
}
document.getElementById('chatFab').addEventListener('click', openChat);
document.getElementById('closeChatBtn').addEventListener('click', closeChat);
document.getElementById('chatBackdrop').addEventListener('click', closeChat);

function addBubble(text, sender) {
  const wrap = document.createElement('div');
  wrap.className = `msg-bubble flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
  const bubble = document.createElement('div');
  bubble.className = sender === 'user'
    ? 'bg-gradient-to-br from-amber-200 to-amber-400 text-black text-sm rounded-2xl rounded-br-sm px-4 py-2.5 max-w-[80%]'
    : 'glass-light text-sm rounded-2xl rounded-bl-sm px-4 py-2.5 max-w-[80%] text-white/90';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  chatMessages.appendChild(wrap);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return bubble;
}

function botSay(fullText) {
  const bubble = addBubble('', 'bot');
  let i = 0;
  const interval = setInterval(() => {
    bubble.textContent += fullText[i];
    chatMessages.scrollTop = chatMessages.scrollHeight;
    i++;
    if (i >= fullText.length) clearInterval(interval);
  }, 14);
}

function renderChips(labels) {
  quickChips.innerHTML = '';
  labels.forEach(label => {
    const chip = document.createElement('button');
    chip.className = 'quick-chip glass-light text-xs rounded-full px-3 py-2 whitespace-nowrap';
    chip.textContent = label;
    chip.addEventListener('click', () => {
      quickChips.innerHTML = '';
      handleUserMessage(label.replace(/^[^\w]+/, '').trim());
    });
    quickChips.appendChild(chip);
  });
}

/* ---------------- Lead capture state machine ---------------- */
const leadState = { step: 'idle', name: '', email: '', date: '' };

function startBookingFlow() {
  quickChips.innerHTML = '';
  leadState.step = 'name';
  botSay("Wonderful! I'd love to arrange your private viewing. First — what name should I put the reservation under?");
}

function handleUserMessage(text) {
  if (!text.trim()) return;
  addBubble(text, 'user');
  chatInput.value = '';

  setTimeout(() => {
    if (leadState.step === 'name') {
      leadState.name = text.trim();
      leadState.step = 'email';
      botSay(`Lovely to meet you, ${leadState.name.split(' ')[0]}. What's the best email to send your confirmation to?`);
      return;
    }
    if (leadState.step === 'email') {
      const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(text.trim());
      if (!valid) {
        botSay("That doesn't quite look like a valid email — could you double check and resend it?");
        return;
      }
      leadState.email = text.trim();
      leadState.step = 'date';
      botSay("Perfect. And what date & time would you prefer for your private viewing? (e.g. 'Sat July 25, 4pm')");
      return;
    }
    if (leadState.step === 'date') {
      leadState.date = text.trim();
      leadState.step = 'done';
      botSay(`All set! Confirming a private viewing for ${leadState.name} on ${leadState.date}. Sending this to our team now…`);
      submitLead();
      return;
    }

    // Free-form intent matching
    const lower = text.toLowerCase();
    if (/price|cost|₹|\$|budget|worth/.test(lower)) {
      botSay("The Meridian Residence is offered at $2,450,000 USD (custom financing available). This includes the fully furnished estate, smart-home automation, and the infinity pool package.");
      renderChips(['📅 Book a Viewing', '📐 Specifications']);
    } else if (/spec|square|bedroom|bathroom|feature|size|area/.test(lower)) {
      botSay("This residence spans 6,400 sq ft across two levels: 4 bedrooms, 5 bathrooms, a rooftop lounge, a 20m infinity pool, smart glass throughout, and a 3-car garage. Built 2025.");
      renderChips(['💰 Pricing', '📅 Book a Viewing']);
    } else if (/book|view|visit|schedule|tour|appointment/.test(lower)) {
      startBookingFlow();
    } else {
      botSay("I can help with pricing, specifications, or scheduling a private viewing — what would you like to know?");
      renderChips(['💰 Pricing', '📐 Specifications', '📅 Book a Viewing']);
    }
  }, 350);
}

document.getElementById('sendChatBtn').addEventListener('click', () => handleUserMessage(chatInput.value));
chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleUserMessage(chatInput.value); });

async function submitLead() {
  const templateParams = {
    to_email: LEAD_DESTINATION_EMAIL,
    client_name: leadState.name,
    client_email: leadState.email,
    viewing_date: leadState.date,
    property: 'The Meridian Residence'
  };

  const isConfigured = !EMAILJS_SERVICE_ID.startsWith('YOUR_') &&
                        !EMAILJS_TEMPLATE_ID.startsWith('YOUR_') &&
                        !EMAILJS_PUBLIC_KEY.startsWith('YOUR_');

  if (!isConfigured) {
    console.warn('[Meridian Concierge] EmailJS keys are not configured — lead was captured locally but NOT emailed. See setup instructions at the top of the script.');
    setTimeout(() => botSay(`✅ Got it, ${leadState.name}! (Note: this demo isn't connected to a live inbox yet — add your EmailJS keys in the code to route real leads to ${LEAD_DESTINATION_EMAIL}.)`), 1400);
    return;
  }

  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams, EMAILJS_PUBLIC_KEY);
    setTimeout(() => botSay(`✅ Confirmed! Our team will reach out to ${leadState.email} shortly to finalize your viewing on ${leadState.date}.`), 1400);
  } catch (err) {
    console.error('EmailJS submission failed:', err);
    setTimeout(() => botSay(`I hit a snag submitting that automatically. Please email us directly at ${LEAD_DESTINATION_EMAIL} and we'll take care of it personally.`), 1400);
  }
}
</script>
